<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>График — Демидович</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--tg-theme-bg-color, #fff);
      color: var(--tg-theme-text-color, #000);
      padding: 16px;
    }
    h2 {
      font-size: 16px;
      margin-bottom: 12px;
      color: var(--tg-theme-hint-color, #666);
    }
    #plot { width: 100%; height: 400px; }
    .controls {
      margin-top: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    label { font-size: 14px; color: var(--tg-theme-hint-color, #888); }
    input[type=text] {
      width: 100%;
      padding: 10px;
      border: 1px solid var(--tg-theme-hint-color, #ccc);
      border-radius: 8px;
      font-size: 15px;
      background: var(--tg-theme-secondary-bg-color, #f5f5f5);
      color: var(--tg-theme-text-color, #000);
    }
    button {
      padding: 12px;
      background: var(--tg-theme-button-color, #2481cc);
      color: var(--tg-theme-button-text-color, #fff);
      border: none;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
    }
    .error { color: #e53935; font-size: 13px; margin-top: 6px; }
  </style>
</head>
<body>

<h2 id="title">График функции</h2>
<div id="plot"></div>

<div class="controls">
  <label>Функция f(x):</label>
  <input type="text" id="func-input" placeholder="например: x^2 - 2*x + 1" />
  <label>Диапазон x: от <input type="text" id="x-from" value="-5" style="width:60px"> до <input type="text" id="x-to" value="5" style="width:60px"></label>
  <button onclick="plotGraph()">Построить</button>
  <div class="error" id="error"></div>
</div>

<script>
  const tg = window.Telegram.WebApp;
  tg.ready();
  tg.expand();

  // Получаем параметры из URL
  const params = new URLSearchParams(window.location.search);
  const volume = params.get('v');
  const section = params.get('s');
  const number = params.get('n');

  if (volume && section && number) {
    document.getElementById('title').textContent =
      `График — Том ${volume}, §${section}, Задача ${number}`;
  }

  function safeEval(expr, x) {
    // Простой безопасный парсер математических выражений
    const safe = expr
      .replace(/\^/g, '**')
      .replace(/(\d)(x)/g, '$1*x')
      .replace(/sin/g, 'Math.sin')
      .replace(/cos/g, 'Math.cos')
      .replace(/tan/g, 'Math.tan')
      .replace(/sqrt/g, 'Math.sqrt')
      .replace(/log/g, 'Math.log')
      .replace(/abs/g, 'Math.abs')
      .replace(/exp/g, 'Math.exp')
      .replace(/pi/g, 'Math.PI')
      .replace(/e(?![a-z])/g, 'Math.E');

    try {
      // eslint-disable-next-line no-new-func
      return Function('x', `"use strict"; return (${safe})`)(x);
    } catch {
      return NaN;
    }
  }

  function plotGraph() {
    const expr = document.getElementById('func-input').value.trim();
    const xFrom = parseFloat(document.getElementById('x-from').value);
    const xTo = parseFloat(document.getElementById('x-to').value);
    const errEl = document.getElementById('error');

    if (!expr) { errEl.textContent = 'Введите функцию'; return; }
    if (isNaN(xFrom) || isNaN(xTo) || xFrom >= xTo) {
      errEl.textContent = 'Проверь диапазон x'; return;
    }
    errEl.textContent = '';

    const steps = 400;
    const xs = [], ys = [];
    for (let i = 0; i <= steps; i++) {
      const x = xFrom + (xTo - xFrom) * i / steps;
      const y = safeEval(expr, x);
      xs.push(x);
      ys.push(isFinite(y) ? y : null);
    }

    const isDark = tg.colorScheme === 'dark';
    const textColor = isDark ? '#eee' : '#333';
    const gridColor = isDark ? '#444' : '#ddd';
    const bgColor = isDark ? '#1e1e1e' : '#fff';

    Plotly.newPlot('plot', [{
      x: xs, y: ys,
      type: 'scatter',
      mode: 'lines',
      line: { color: '#2481cc', width: 2.5 },
      connectgaps: false,
    }], {
      paper_bgcolor: bgColor,
      plot_bgcolor: bgColor,
      font: { color: textColor, size: 12 },
      xaxis: {
        title: 'x',
        gridcolor: gridColor,
        zerolinecolor: gridColor,
      },
      yaxis: {
        title: 'f(x)',
        gridcolor: gridColor,
        zerolinecolor: gridColor,
      },
      margin: { l: 50, r: 20, t: 20, b: 50 },
    }, { responsive: true, displayModeBar: false });
  }

  // Строим пример при загрузке
  document.getElementById('func-input').value = 'x^2';
  plotGraph();
</script>
</body>
</html>
